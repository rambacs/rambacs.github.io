<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirect Hub</title>

  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --primary: #847cff;
      --secondary: #5da9ff;
      --text: #e5e7eb;
      --muted: #9ca3af;
    }

    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #020617, #020617 40%, #0f172a);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: var(--card);
      padding: 2.5rem;
      border-radius: 16px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.8rem;
    }

    p {
      margin: 0 0 2rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    a {
      text-decoration: none;
      padding: 0.9rem 1.2rem;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .vending {
      background: linear-gradient(135deg, var(--primary), #5da9ff);
      color: #020617;
    }

    .barf {
      background: linear-gradient(135deg, var(--secondary), #847cff);
      color: #020617;
    }

    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);
    }

    footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Project Redirects</h1>
    <p>Select where you want to go</p>

    <div class="buttons">
      <a class="vending" href="https://rambacs.github.io/vending-machine">
        ☕️ Vending Machine
      </a>
      <a class="barf" href="https://rambacs.github.io/barf-calculator">
        🐾 BARF Calculator
      </a>
    </div>

    <footer>
      Hosted on GitHub Pages
    </footer>
  </div>
</body>
</html>
